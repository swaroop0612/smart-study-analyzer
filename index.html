<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Smart Study Analyzer v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060612;
      --card:     #0d0d1f;
      --border:   rgba(139,92,246,0.12);
      --accent:   #8b5cf6;
      --accent2:  #ec4899;
      --accent3:  #06b6d4;
      --text:     #f8f8ff;
      --muted:    #6b7280;
      --muted2:   #9ca3af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(139,92,246,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(236,72,153,0.1) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .header { text-align: center; margin-bottom: 52px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.2);
      color: #a78bfa;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 100px;
      margin-bottom: 28px;
      animation: fadeUp .5s ease both;
    }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:#8b5cf6; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      font-weight: 700; line-height: 1.08; letter-spacing: -0.03em;
      animation: fadeUp .5s .08s ease both;
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 60%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .subtitle {
      margin-top: 16px; font-size: 1rem;
      color: var(--muted2); font-weight: 400; line-height: 1.65;
      animation: fadeUp .5s .16s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px; padding: 44px 40px;
      position: relative; overflow: hidden;
      animation: fadeUp .5s .22s ease both;
      box-shadow: 0 0 0 1px rgba(139,92,246,0.05), 0 32px 80px rgba(0,0,0,0.5);
    }
    .form-card::before {
      content: '';
      position: absolute; top:0; left:10%; right:10%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.6), rgba(236,72,153,0.4), transparent);
    }

    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: #a78bfa;
      display: flex; align-items: center; gap: 10px; margin-bottom: 22px;
    }
    .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .field { margin-bottom: 20px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted2); letter-spacing: 0.04em;
      margin-bottom: 8px; text-transform: uppercase;
    }

    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(139,92,246,0.15);
      border-radius: 14px; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      padding: 14px 18px; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input:focus {
      border-color: rgba(139,92,246,0.5);
      background: rgba(139,92,246,0.05);
      box-shadow: 0 0 0 4px rgba(139,92,246,0.08);
    }
    input::placeholder { color: rgba(107,114,128,0.6); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }

    .divider { height:1px; background: var(--border); margin: 28px 0; }

    .stars { display:flex; flex-direction:row-reverse; justify-content:flex-end; gap:6px; margin-top:6px; }
    .stars input { display:none; }
    .stars label {
      font-size:28px; cursor:pointer; color:rgba(255,255,255,0.1);
      transition: color .15s, transform .15s;
      margin:0; padding:0; text-transform:none; letter-spacing:0;
    }
    .stars label:hover, .stars label:hover ~ label, .stars input:checked ~ label { color:#f59e0b; }
    .stars label:hover { transform:scale(1.25); }

    .pills { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }
    .pills input { display:none; }
    .pills label {
      cursor:pointer; padding:9px 22px; border-radius:100px;
      border:1px solid rgba(139,92,246,0.15);
      font-size:13px; font-weight:500; color:var(--muted2);
      background:transparent; transition:all .2s;
      text-transform:none; letter-spacing:0;
    }
    .pills input:checked + label {
      border-color:var(--accent); color:#c4b5fd;
      background:rgba(139,92,246,0.12);
      box-shadow:0 0 16px rgba(139,92,246,0.15);
    }
    .pills label:hover { border-color:rgba(139,92,246,0.35); color:var(--text); }

    .btn-wrap { margin-top:32px; }
    .btn {
      width:100%; padding:16px;
      background:linear-gradient(135deg, #7c3aed 0%, #8b5cf6 50%, #a855f7 100%);
      border:none; border-radius:16px; color:#fff;
      font-family:'Space Grotesk', sans-serif;
      font-size:15px; font-weight:700; letter-spacing:0.02em;
      cursor:pointer; position:relative; overflow:hidden;
      transition:transform .2s, box-shadow .2s;
      box-shadow:0 4px 32px rgba(124,58,237,0.35), 0 0 0 1px rgba(139,92,246,0.3);
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(124,58,237,0.5); }
    .btn:active { transform:translateY(0); }
    .btn-inner { display:flex; align-items:center; justify-content:center; gap:10px; position:relative; z-index:1; }

    .toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:#0d0d1f; border:1px solid rgba(6,182,212,0.3); color:#67e8f9;
      font-family:'Space Grotesk', sans-serif; font-size:13px; font-weight:600;
      padding:13px 28px; border-radius:100px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
      transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s;
      opacity:0; z-index:100; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    .footer {
      text-align:center; margin-top:36px;
      font-size:12px; color:rgba(107,114,128,0.4);
      animation:fadeUp .5s .4s ease both;
    }

    @media (max-width:560px) {
      .form-card { padding:28px 20px; }
      .grid-2 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="badge"><span class="badge-dot"></span> Study Intelligence</div>
    <h1>Smart <em>Study</em><br>Analyzer</h1>
    <p class="subtitle">Track every session. Discover your patterns.<br>Study smarter — not harder.</p>
  </div>

  <div class="form-card">
    <div class="section-label">Session Details</div>
    <div class="field">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="e.g. Swaroop" autocomplete="off"/>
    </div>
    <div class="grid-2">
      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. Mathematics" autocomplete="off"/>
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date"/>
      </div>
      <div class="field">
        <label for="hours">Study Hours</label>
        <input type="number" id="hours" placeholder="e.g. 3" min="0" max="24" step="0.5"/>
      </div>
      <div class="field">
        <label for="break_time">Break Time (mins)</label>
        <input type="number" id="break_time" placeholder="e.g. 30" min="0" max="300"/>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Focus & Distraction</div>

    <div class="field">
      <label>Focus Rating</label>
      <div class="stars">
        <input type="radio" id="s5" name="focus" value="5"/><label for="s5">★</label>
        <input type="radio" id="s4" name="focus" value="4"/><label for="s4">★</label>
        <input type="radio" id="s3" name="focus" value="3"/><label for="s3">★</label>
        <input type="radio" id="s2" name="focus" value="2"/><label for="s2">★</label>
        <input type="radio" id="s1" name="focus" value="1"/><label for="s1">★</label>
      </div>
    </div>

    <div class="field" style="margin-top:20px">
      <label>Distraction Level</label>
      <div class="pills">
        <input type="radio" id="d-low"    name="distraction" value="Low"/><label for="d-low">🟢 Low</label>
        <input type="radio" id="d-medium" name="distraction" value="Medium"/><label for="d-medium">🟡 Medium</label>
        <input type="radio" id="d-high"   name="distraction" value="High"/><label for="d-high">🔴 High</label>
      </div>
    </div>

    <div class="btn-wrap">
      <button class="btn" onclick="submitForm()">
        <div class="btn-inner">Log Study Session →</div>
      </button>
    </div>
  </div>

  <div class="footer" style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:36px;">
  <a href="dashboard.html" style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:#a78bfa;text-decoration:none;padding:9px 24px;border:1px solid rgba(139,92,246,0.25);border-radius:100px;background:rgba(139,92,246,0.06);transition:all .2s;" onmouseover="this.style.background='rgba(139,92,246,0.14)'" onmouseout="this.style.background='rgba(139,92,246,0.06)'">View Dashboard →</a>
  <span style="font-size:12px;color:rgba(107,114,128,0.4);">Smart Study Analyzer — built by you 🚀</span>
</div>
</div>

<div class="toast" id="toast">✦ Session logged successfully!</div>

<script>
  document.getElementById('date').valueAsDate = new Date();

  function submitForm() {
    const name        = document.getElementById('name').value.trim();
const subject     = document.getElementById('subject').value.trim();
    const date        = document.getElementById('date').value;
    const hours       = document.getElementById('hours').value;
    const break_time  = document.getElementById('break_time').value;
    const focus       = document.querySelector('input[name="focus"]:checked');
    const distraction = document.querySelector('input[name="distraction"]:checked');

   if (!name || !subject || !date || !hours || !break_time || !focus || !distraction) {
      document.querySelector('.form-card').animate([
        {transform:'translateX(0)'},{transform:'translateX(-8px)'},
        {transform:'translateX(8px)'},{transform:'translateX(-5px)'},
        {transform:'translateX(5px)'},{transform:'translateX(0)'}
      ], {duration:400, easing:'ease-in-out'});
      return;
    }

    fetch('https://smart-study-analyzer.onrender.com/log', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name, subject, date,
        hours: parseFloat(hours),
        break_time: parseInt(break_time),
        focus: parseInt(focus.value),
        distraction: distraction.value
      })
    })
    .then(r => r.json())
    .then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    })
    .catch(() => alert('Could not connect. Is Flask running?'));
  }
</script>
</body>
</html>
